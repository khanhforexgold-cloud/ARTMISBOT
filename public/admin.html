<!DOCTYPE html><html lang='vi'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>ARTEMIS Admin</title><link rel='stylesheet' href='/style.css'></head><body><div class='container'><div class='card' id='loginBox'><h1>ARTEMIS Admin</h1><p class='small'>Sửa hero, tín hiệu, gói giá, lead.</p><input id='password' type='password' placeholder='Mật khẩu admin'><button class='btn btn-primary' onclick='login()'>Đăng nhập</button></div><div id='adminBox' class='hidden'><div class='card'><button class='btn btn-secondary' onclick="showTab('hero')">Hero</button> <button class='btn btn-secondary' onclick="showTab('signals')">Tín hiệu</button> <button class='btn btn-secondary' onclick="showTab('packages')">Gói giá</button> <button class='btn btn-secondary' onclick="showTab('leads')">Lead</button></div><div class='card' id='heroTab'><h2>Hero</h2><input id='heroTitle'><input id='heroSubtitle'><input id='heroHotline'><input id='heroZalo'><button class='btn btn-primary' onclick='saveHero()'>Lưu Hero</button></div><div class='card hidden' id='signalsTab'><h2>Tín hiệu</h2><div id='signalsList'></div><button class='btn btn-secondary' onclick='addSignal()'>Thêm tín hiệu</button> <button class='btn btn-primary' onclick='saveSignals()'>Lưu tín hiệu</button></div><div class='card hidden' id='packagesTab'><h2>Gói giá</h2><div id='packagesList'></div><button class='btn btn-secondary' onclick='addPackage()'>Thêm gói</button> <button class='btn btn-primary' onclick='savePackages()'>Lưu gói giá</button></div><div class='card hidden' id='leadsTab'><h2>Lead</h2><div id='leadsList'></div></div></div></div><script src='/app.js'></script><script>let adminPassword='',signals=[],packages=[];async function login(){try{adminPassword=password.value;await ARTEMIS.fetchJson('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:adminPassword})});loginBox.classList.add('hidden');adminBox.classList.remove('hidden');await Promise.all([loadHero(),loadSignals(),loadPackages(),loadLeads()])}catch(err){alert(err.message)}}function showTab(name){['heroTab','signalsTab','packagesTab','leadsTab'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById(name+'Tab').classList.remove('hidden')}async function loadHero(){const h=await ARTEMIS.fetchJson('/api/hero');heroTitle.value=h.title||'';heroSubtitle.value=h.subtitle||'';heroHotline.value=h.hotline||'';heroZalo.value=h.zalo||''}async function saveHero(){await ARTEMIS.fetchJson('/api/admin/hero',{method:'PUT',headers:{'Content-Type':'application/json','x-admin-password':adminPassword},body:JSON.stringify({title:heroTitle.value,subtitle:heroSubtitle.value,hotline:heroHotline.value,zalo:heroZalo.value})});alert('Đã lưu Hero')}async function loadSignals(){signals=await ARTEMIS.fetchJson('/api/signals');renderSignals()}function renderSignals(){signalsList.innerHTML=signals.map((s,i)=>`<div class='card'><input value='${s.badge||''}' oninput="signals[${i}].badge=this.value"><input value='${s.title||''}' oninput="signals[${i}].title=this.value"><textarea oninput="signals[${i}].desc=this.value">${s.desc||''}</textarea><input value='${(s.tags||[]).join(', ')}' oninput="signals[${i}].tags=this.value.split(',').map(v=>v.trim()).filter(Boolean)"><button class='btn btn-secondary' onclick='signals.splice(${i},1);renderSignals()'>Xóa</button></div>`).join('')}function addSignal(){signals.push({badge:'NEW',title:'XAUUSD M15',desc:'Mô tả tín hiệu',tags:['RSI OK']});renderSignals()}async function saveSignals(){await ARTEMIS.fetchJson('/api/admin/signals',{method:'PUT',headers:{'Content-Type':'application/json','x-admin-password':adminPassword},body:JSON.stringify(signals)});alert('Đã lưu tín hiệu')}async function loadPackages(){packages=await ARTEMIS.fetchJson('/api/packages');renderPackages()}function renderPackages(){packagesList.innerHTML=packages.map((p,i)=>`<div class='card'><input value='${p.tag||''}' oninput="packages[${i}].tag=this.value"><input value='${p.name||''}' oninput="packages[${i}].name=this.value"><input value='${p.priceMain||''}' oninput="packages[${i}].priceMain=this.value"><input value='${p.priceUnit||''}' oninput="packages[${i}].priceUnit=this.value"><textarea oninput="packages[${i}].desc=this.value">${p.desc||''}</textarea><input value='${p.button||''}' oninput="packages[${i}].button=this.value"><input value='${(p.features||[]).join(' | ')}' oninput="packages[${i}].features=this.value.split('|').map(v=>v.trim()).filter(Boolean)"><button class='btn btn-secondary' onclick='packages.splice(${i},1);renderPackages()'>Xóa</button></div>`).join('')}function addPackage(){packages.push({tag:'GÓI MỚI',name:'Gói mới',priceMain:'0',priceUnit:'K',desc:'Mô tả gói',button:'Đăng ký ngay',features:['Quyền lợi 1'],primary:false});renderPackages()}async function savePackages(){await ARTEMIS.fetchJson('/api/admin/packages',{method:'PUT',headers:{'Content-Type':'application/json','x-admin-password':adminPassword},body:JSON.stringify(packages)});alert('Đã lưu gói giá')}async function loadLeads(){const rows=await ARTEMIS.fetchJson('/api/admin/leads',{headers:{'x-admin-password':adminPassword}});leadsList.innerHTML=rows.map(r=>`<div class='card'><b>${r.name||''}</b><div>${r.phone||''}</div><div>${r.packageName||''}</div><div>${r.capital||''}</div><div>${r.market||''}</div><div>${new Date(r.createdAt).toLocaleString('vi-VN')}</div></div>`).join('')}</script></body></html>
