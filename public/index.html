<!DOCTYPE html><html lang='vi'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>ARTEMIS BOT</title><link rel='stylesheet' href='/style.css'></head><body><div class='nav'><div class='container'><b>ARTEMIS BOT</b></div></div><div class='container'><div class='hero'><h1 id='heroTitle'>ARTEMIS BOT</h1><p id='heroSub'>Premium Trading System</p></div><h2>Tín hiệu nổi bật</h2><div id='signalGrid' class='grid'></div><h2>Gói giá</h2><div id='packageGrid' class='grid'></div><div class='card'><h2>Đăng ký nhanh</h2><form id='leadForm'><input name='name' placeholder='Họ và tên' required><input name='phone' placeholder='Số điện thoại / Zalo' required><select name='packageName'><option value=''>Chọn gói</option><option>Gói Demo</option><option>Gói Pro</option><option>Gói VIP</option></select><input name='capital' placeholder='Số vốn'><input name='market' placeholder='Thị trường'><textarea name='note' placeholder='Ghi chú'></textarea><button class='btn btn-primary' type='submit'>Gửi đăng ký</button><div id='leadStatus'></div></form></div></div><script src='/app.js'></script><script>loadHomeData();document.getElementById('leadForm').addEventListener('submit',async(e)=>{e.preventDefault();const f=e.target;const status=document.getElementById('leadStatus');status.textContent='Đang gửi...';try{await ARTEMIS.fetchJson('/api/leads',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:f.name.value,phone:f.phone.value,packageName:f.packageName.value,capital:f.capital.value,market:f.market.value,note:f.note.value})});status.textContent='Đã gửi thành công';f.reset()}catch(err){status.textContent=err.message}})</script></body></html>
